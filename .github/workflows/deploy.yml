name: deploy to github pages

on:
  push:
    branches:
      - master

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5

      - name: install beautifulsoup4 for parsing html
        run: pip install beautifulsoup4

      - name: generate docs search indexes
        run: python docs/util_scripts/generate_search_index.py 

      - name: commit search indexes
        run: | 
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add **/search_index.json
          git diff --cached --quiet || git commit -m "update documentation search indexes [skip ci]"
          git push

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: deploy to github pages
        uses: actions/deploy-pages@v4




      

